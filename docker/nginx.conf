server {
    listen 80;
    server_name _;

    root /var/www/html;
    index index.php;

    charset utf-8;
    client_max_body_size 20m;

    location ~ /\.(?!well-known) {
        deny all;
    }

    location ^~ /core/ {
        deny all;
    }

    location ^~ /data/ {
        deny all;
    }

    location ~* ^/(composer\.(json|lock)|package\.json|package-lock\.json|yarn\.lock|pnpm-lock\.yaml|README\.md|LICENSE|Dockerfile|docker-compose\.ya?ml)$ {
        deny all;
    }

    location ^~ /assets/ {
        access_log off;
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri =404;
    }

    location = /favicon.ico {
        access_log off;
        expires 30d;
        try_files $uri =404;
    }

    location = /admin {
        rewrite ^ /admin.php?$query_string last;
    }

    location = /admin/ {
        rewrite ^ /admin.php?$query_string last;
    }

    location ~ ^/admin/(domains|stats|email|site|value|footer)/?$ {
        rewrite ^/admin/([a-z]+)/?$ /admin.php?section=$1&$query_string last;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;

        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_index index.php;
        fastcgi_pass php:9000;
        fastcgi_read_timeout 60s;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
